services:
  - type: web
    name: debate-engine-api
    env: python
    buildCommand: pip install -e .
    startCommand: python api_server.py
    plan: free
    autoDeploy: true
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_API_KEY_1
        sync: false
      - key: NVIDIA_API_KEY_2
        sync: false
      - key: NVIDIA_API_KEY_3
        sync: false
      - key: NVIDIA_API_KEY_4
        sync: false
      - key: NVIDIA_API_KEY_5
        sync: false
      - key: NVIDIA_API_KEY_6
        sync: false
      - key: NVIDIA_API_KEY_7
        sync: false
      - key: NVIDIA_API_KEY_8
        sync: false
      - key: NVIDIA_API_KEY_9
        sync: false
      - key: NVIDIA_API_KEY_10
        sync: false
