name: Test and Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

concurrency:
  group: "api-deployment"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Test the API
        run: |
          python -m pytest tests/ -v --ignore=tests/test_mcp.py --asyncio-mode=auto
      
      - name: Test NVIDIA API connection
        run: |
          echo "Testing NVIDIA API connection..."
          python -c '
          from openai import OpenAI
          import os
          
          api_key = os.getenv("NVIDIA_API_KEY")
          if not api_key:
              print("NVIDIA API key not found, skipping test")
          else:
              try:
                  client = OpenAI(
                    base_url = "https://integrate.api.nvidia.com/v1",
                    api_key = api_key
                  )
                  
                  completion = client.chat.completions.create(
                    model="minimaxai/minimax-m2.7",
                    messages=[{"role":"user","content":"Hello, test message"}],
                    temperature=1,
                    top_p=0.95,
                    max_tokens=100
                  )
                  print("NVIDIA API test successful:", completion.choices[0].message.content)
              except Exception as e:
                  print("NVIDIA API test failed:", str(e))
                  print("Continuing with deployment despite API test failure")
          '
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Render
        run: |
          echo "Render deployment triggered"
          echo "The API is deployed automatically via Render's GitHub integration"
          echo "Check Render dashboard for deployment status: https://dashboard.render.com/"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
