name: Deploy API to GitHub Actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write
  deployments: write

concurrency:
  group: "api-deployment"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Test the API
        run: |
          python -m pytest tests/ -v
      
      - name: Deploy API service
        run: |
          echo "Deploying API service..."
          # This is a placeholder for actual deployment
          # In production, this would deploy to a cloud provider
          echo "API service deployed successfully"

  test-api:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Test API endpoint
        run: |
          echo "Testing API endpoint..."
          # Test with NVIDIA API
          python -c '
          from openai import OpenAI
          import os
          
          client = OpenAI(
            base_url = "https://integrate.api.nvidia.com/v1",
            api_key = os.getenv("NVIDIA_API_KEY")
          )
          
          try:
              completion = client.chat.completions.create(
                model="minimaxai/minimax-m2.7",
                messages=[{"role":"user","content":"Hello, test message"}],
                temperature=1,
                top_p=0.95,
                max_tokens=100
              )
              print("API test successful:", completion.choices[0].message.content)
          except Exception as e:
              print("API test failed:", str(e))
          '
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
