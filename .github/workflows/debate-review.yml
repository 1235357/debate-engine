name: DebateEngine Multi-Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  debate-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install DebateEngine
        run: pip install debate-engine
      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.java
            **/*.go
            **/*.rs
      - name: Run DebateEngine Review
        if: steps.changed.outputs.any_changed == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEBATE_ENGINE_PROVIDER_MODE: stable
        run: |
          python -c "
          import asyncio, json, sys, os
          from debate_engine import QuickCritiqueEngine
          from debate_engine.schemas import CritiqueConfigSchema, TaskType
          from debate_engine.output import consensus_to_sarif
          changed = os.environ.get('CHANGED_FILES', '').split()
          content = ''
          for f in changed[:10]:
              try:
                  with open(f) as fh: content += '\n\n--- ' + f + ' ---\n' + fh.read()[:2000]
              except: pass
          if not content.strip(): sys.exit(0)
          async def review():
              engine = QuickCritiqueEngine()
              config = CritiqueConfigSchema(content=content[:8000], task_type=TaskType.CODE_REVIEW)
              consensus = await engine.critique(config)
              sarif = consensus_to_sarif(consensus)
              with open('debate-results.sarif', 'w') as f: json.dump(sarif, f, indent=2)
              critical = [c for c in consensus.critiques_summary if c.severity.value == 'CRITICAL']
              major = [c for c in consensus.critiques_summary if c.severity.value == 'MAJOR']
              minor = [c for c in consensus.critiques_summary if c.severity.value == 'MINOR']
              comment = '## DebateEngine Multi-Agent Review\n\n'
              comment += f'**Confidence:** {consensus.consensus_confidence:.0%}\n\n'
              comment += '| Severity | Count |\n|----------|-------|\n'
              comment += f'| CRITICAL | {len(critical)} |\n| MAJOR | {len(major)} |\n| MINOR | {len(minor)} |\n\n'
              for c in consensus.critiques_summary:
                  emoji = '🔴' if c.severity.value == 'CRITICAL' else '🟡' if c.severity.value == 'MAJOR' else '🟢'
                  comment += f'{emoji} **[{c.severity.value}] {c.defect_type.value}** — {c.target_area}\n'
                  comment += f'> {c.evidence[:200]}\n> **Fix:** {c.suggested_fix[:200]}\n\n'
              if consensus.preserved_minority_opinions:
                  comment += '### Devil\'s Advocate Findings\n'
                  for mo in consensus.preserved_minority_opinions:
                      comment += f'- ⚠️ {mo.opinion[:200]} (Risk: {mo.potential_risk_if_ignored[:100]})\n'
              with open('pr-comment.md', 'w') as f: f.write(comment)
              if critical:
                  print(f'::error::Found {len(critical)} CRITICAL issues')
                  sys.exit(1)
          asyncio.run(review())
          "
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: debate-results.sarif
      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '';
            try { comment = fs.readFileSync('pr-comment.md', 'utf8'); } catch(e) {}
            if (comment) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }