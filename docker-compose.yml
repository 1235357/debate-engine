services:
  debate-engine:
    build: .
    ports:
      - "8765:8765"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEBATE_ENGINE_PROVIDER_MODE=stable
      - DEBATE_ENGINE_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8765/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped